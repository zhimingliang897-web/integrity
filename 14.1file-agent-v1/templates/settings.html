<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私人文件系统 - 设置</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f14;
            --surface: #161922;
            --surface2: #1e2230;
            --border: #2a2f42;
            --accent: #6c63ff;
            --text: #e8eaf0;
            --text-dim: #8892a4;
            --success: #4ecdc4;
            --error: #ff6b6b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 30px; }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .card h2 { font-size: 16px; font-weight: 500; margin-bottom: 20px; color: var(--text); }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }
        input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--accent); }
        .btn {
            padding: 10px 20px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #5a52d5; }
        .btn.ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
        }
        .btn.ghost:hover { border-color: var(--accent); color: var(--text); }
        .actions { display: flex; gap: 10px; margin-top: 20px; }
        .msg { font-size: 13px; margin-top: 15px; padding: 10px; border-radius: 8px; }
        .msg.success { background: #4ecdc420; color: var(--success); }
        .msg.error { background: #ff6b6b20; color: var(--error); }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ 系统设置</h1>
        
        <div class="card">
            <h2>🔐 登录密码</h2>
            <div class="form-group">
                <label for="password">新密码</label>
                <input type="password" id="password" placeholder="输入新密码">
            </div>
        </div>
        
        <div class="card">
            <h2>🤖 LLM 配置 (阿里百炼)</h2>
            <div class="form-group">
                <label for="llm-api-key">API Key</label>
                <input type="text" id="llm-api-key" placeholder="sk-xxxxxx">
            </div>
        </div>
        
        <div class="card">
            <h2>🌐 内网穿透 (Natapp)</h2>
            <div class="form-group">
                <label for="natapp-token">Authtoken</label>
                <input type="text" id="natapp-token" placeholder="输入 natapp authtoken">
            </div>
        </div>
        
        <div class="card">
            <h2>📧 邮箱配置 (用于发送文件)</h2>
            <div class="form-group">
                <label for="email-sender">发件邮箱</label>
                <input type="email" id="email-sender" placeholder="your@qq.com">
            </div>
            <div class="form-group">
                <label for="email-password">邮箱授权码</label>
                <input type="password" id="email-password" placeholder="16位授权码">
            </div>
        </div>
        

        <div class="card">
            <h2>Mounts Manager</h2>
            <div class="actions">
                <a href="/mounts" class="btn">Open Mounts UI</a>
                <a href="/" class="btn ghost">Back to MyFiles</a>
            </div>
        </div>
        <div class="actions">
            <button class="btn" id="save-btn">保存设置</button>
            <a href="/" class="btn ghost">返回首页</a>
        </div>
        <div class="msg" id="msg" style="display:none;"></div>
    </div>
    
    <script>
        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const data = await res.json();
                if (data.llm_api_key) {
                    document.getElementById('llm-api-key').placeholder = data.llm_api_key;
                }
                if (data.natapp_token) {
                    document.getElementById('natapp-token').placeholder = data.natapp_token;
                }
                if (data.email_sender) {
                    document.getElementById('email-sender').value = data.email_sender;
                }
            } catch (e) {
                console.error('Load config failed:', e);
            }
        }
        
        loadConfig();
        
        document.getElementById('save-btn').addEventListener('click', async () => {
            const msg = document.getElementById('msg');
            msg.style.display = 'none';
            
            const data = {};
            
            const password = document.getElementById('password').value;
            if (password) data.password = password;
            
            const llmApiKey = document.getElementById('llm-api-key').value;
            if (llmApiKey) data.llm_api_key = llmApiKey;
            
            const natappToken = document.getElementById('natapp-token').value;
            if (natappToken) data.natapp_token = natappToken;
            
            const emailSender = document.getElementById('email-sender').value;
            const emailPassword = document.getElementById('email-password').value;
            if (emailSender || emailPassword) {
                data.email_sender = emailSender;
                data.email_password = emailPassword;
            }
            
            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await res.json();
                
                msg.textContent = result.message || '保存成功';
                msg.className = 'msg success';
                msg.style.display = 'block';
                
                document.getElementById('password').value = '';
                document.getElementById('llm-api-key').value = '';
                document.getElementById('natapp-token').value = '';
                document.getElementById('email-password').value = '';
                
            } catch (e) {
                msg.textContent = '保存失败: ' + e.message;
                msg.className = 'msg error';
                msg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
