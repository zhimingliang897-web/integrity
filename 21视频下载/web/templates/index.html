<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>21视频下载器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .status-pending { color: #9ca3af; }
        .status-downloading { color: #3b82f6; }
        .status-completed { color: #10b981; }
        .status-failed { color: #ef4444; }
        .status-cancelled { color: #f59e0b; }
        
        .progress-bar {
            transition: width 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body class="text-white">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-5xl font-bold gradient-text mb-2">21视频下载器</h1>
            <p class="text-gray-400">支持B站、NTU课程网站 | 无时间限制 | 无数量限制</p>
        </header>
        
        <!-- 依赖检查 -->
        <div id="depWarning" class="hidden mb-6 p-4 bg-yellow-900/50 border border-yellow-600 rounded-lg">
            <div class="flex items-center gap-2 text-yellow-400">
                <i class="fas fa-exclamation-triangle"></i>
                <span>请确保已安装 yt-dlp 和 ffmpeg</span>
            </div>
        </div>
        
        <!-- 主要内容区 -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 左侧：配置和下载 -->
            <div class="lg:col-span-1 space-y-6">
                <!-- 配置面板 -->
                <div class="glass rounded-xl p-6">
                    <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                        <i class="fas fa-cog text-purple-400"></i>
                        配置
                    </h2>
                    
                    <!-- Cookie配置 -->
                    <div class="mb-4">
                        <label class="block text-sm text-gray-400 mb-2">Cookie (可选)</label>
                        <textarea 
                            id="cookiesInput" 
                            class="w-full bg-gray-800/50 border border-gray-700 rounded-lg p-3 text-sm focus:outline-none focus:border-purple-500 resize-none"
                            rows="4"
                            placeholder="粘贴cookies.txt内容..."
                        ></textarea>
<p class="text-xs text-gray-500 mt-1">用于下载B站高清视频和NTU课程</p>
                    </div>
                    
                    <!-- 保存目录 -->
                    <div class="mb-4">
                        <label class="block text-sm text-gray-400 mb-2">下载目录</label>
                        <input 
                            type="text" 
                            id="downloadDirInput" 
                            class="w-full bg-gray-800/50 border border-gray-700 rounded-lg p-3 text-sm focus:outline-none focus:border-purple-500"
                            value="downloads"
                        >
                    </div>
                    
                    <button 
                        onclick="saveConfig()" 
                        class="w-full btn-primary py-2 rounded-lg font-medium"
                    >
                        <i class="fas fa-save mr-2"></i>保存配置
                    </button>
                </div>
                
                <!-- 下载面板 -->
                <div class="glass rounded-xl p-6">
                    <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                        <i class="fas fa-download text-green-400"></i>
                        添加下载
                    </h2>
                    
                    <textarea 
                        id="urlInput" 
                        class="w-full bg-gray-800/50 border border-gray-700 rounded-lg p-3 text-sm focus:outline-none focus:border-purple-500 mb-4"
                        rows="3"
                        placeholder="输入视频URL (支持多个，换行分隔)"
                    ></textarea>
                    
                    <button 
                        onclick="addTask()" 
                        class="w-full btn-primary py-3 rounded-lg font-medium"
                    >
                        <i class="fas fa-plus mr-2"></i>开始下载
                    </button>
                    
                    <p class="text-xs text-gray-500 mt-3">
                        支持批量添加，每行一个URL
                    </p>
                </div>
            </div>
            
            <!-- 右侧：任务列表 -->
            <div class="lg:col-span-2">
                <div class="glass rounded-xl p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xl font-semibold flex items-center gap-2">
                            <i class="fas fa-tasks text-blue-400"></i>
                            下载任务
                        </h2>
                        <button 
                            onclick="clearCompleted()" 
                            class="text-sm text-gray-400 hover:text-white"
                        >
                            <i class="fas fa-trash-alt mr-1"></i>清理已完成
                        </button>
                    </div>
                    
                    <!-- 任务列表 -->
                    <div id="taskList" class="space-y-3 max-h-[500px] overflow-y-auto">
                        <div class="text-center text-gray-500 py-10">
                            <i class="fas fa-inbox text-4xl mb-3"></i>
                            <p>暂无下载任务</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 页脚 -->
        <footer class="text-center mt-10 text-gray-500 text-sm">
            <p>21视频下载器 &copy; 2026 | 基于 yt-dlp 构建</p>
        </footer>
    </div>
    
    <script>
        // 全局变量
        let refreshInterval = null;
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', async () => {
            await checkDependencies();
            await loadConfig();
            startTaskRefresh();
        });
        
        // 检查依赖
        async function checkDependencies() {
            try {
                const res = await fetch('/api/dependencies');
                const data = await res.json();
                
                if (!data.all_ok) {
                    document.getElementById('depWarning').classList.remove('hidden');
                }
            } catch (e) {
                console.error('Failed to check dependencies:', e);
            }
        }
        
        // 加载配置
        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const data = await res.json();
                
                if (data.cookies_exists) {
                    // 只显示长度，不显示内容
                    document.getElementById('cookiesInput').placeholder = 
                        `Cookie已配置 (${data.cookies_length} 字符)`;
                }
                
                document.getElementById('downloadDirInput').value = data.download_dir;
            } catch (e) {
                console.error('Failed to load config:', e);
            }
        }
        
        // 保存配置
        async function saveConfig() {
            const cookies = document.getElementById('cookiesInput').value;
            const downloadDir = document.getElementById('downloadDirInput').value;
            
            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        cookies: cookies || null,
                        download_dir: downloadDir
                    })
                });
                
                if (res.ok) {
                    alert('配置已保存！');
                    if (cookies) {
                        document.getElementById('cookiesInput').placeholder = 
                            `Cookie已配置 (${cookies.length} 字符)`;
                        document.getElementById('cookiesInput').value = '';
                    }
                }
            } catch (e) {
                alert('保存失败: ' + e.message);
            }
        }
        
        // 添加下载任务
        async function addTask() {
            const urlInput = document.getElementById('urlInput');
            const urls = urlInput.value.trim().split('\n').filter(u => u.trim());
            
            if (urls.length === 0) {
                alert('请输入视频URL');
                return;
            }
            
            for (const url of urls) {
                try {
                    await fetch('/api/add_task', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({url: url.trim()})
                    });
                } catch (e) {
                    console.error('Failed to add task:', e);
                }
            }
            
            urlInput.value = '';
        }
        
        // 获取状态图标
        function getStatusIcon(status) {
            const icons = {
                'pending': '<i class="fas fa-clock"></i>',
                'downloading': '<i class="fas fa-spinner fa-spin"></i>',
                'completed': '<i class="fas fa-check-circle"></i>',
                'failed': '<i class="fas fa-times-circle"></i>',
                'cancelled': '<i class="fas fa-ban"></i>'
            };
            return icons[status] || icons['pending'];
        }
        
        // 获取状态文字
        function getStatusText(status) {
            const texts = {
                'pending': '等待中',
                'downloading': '下载中',
                'completed': '已完成',
                'failed': '失败',
                'cancelled': '已取消'
            };
            return texts[status] || '未知';
        }
        
        // 刷新任务列表
        async function refreshTasks() {
            try {
                const res = await fetch('/api/tasks');
                const data = await res.json();
                
                const taskList = document.getElementById('taskList');
                const tasks = data.tasks;
                
                if (tasks.length === 0) {
                    taskList.innerHTML = `
                        <div class="text-center text-gray-500 py-10">
                            <i class="fas fa-inbox text-4xl mb-3"></i>
                            <p>暂无下载任务</p>
                        </div>
                    `;
                    return;
                }
                
                // 按状态排序：下载中 > 等待 > 其他
                const statusOrder = {downloading: 0, pending: 1, failed: 2, cancelled: 3, completed: 4};
                tasks.sort((a, b) => statusOrder[a.status] - statusOrder[b.status]);
                
                taskList.innerHTML = tasks.map(task => `
                    <div class="bg-gray-800/50 rounded-lg p-4 border border-gray-700">
                        <div class="flex items-start justify-between mb-2">
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-medium truncate">${task.filename || '解析中...'}</p>
                                <p class="text-xs text-gray-500 truncate">${task.url}</p>
                            </div>
                            <div class="flex items-center gap-2 ml-2">
                                <span class="status-${task.status} text-sm">
                                    ${getStatusIcon(task.status)} ${getStatusText(task.status)}
                                </span>
                                ${task.status === 'downloading' || task.status === 'pending' ? 
                                    `<button onclick="cancelTask('${task.task_id}')" class="text-gray-500 hover:text-red-400">
                                        <i class="fas fa-times"></i>
                                    </button>` : ''
                                }
                            </div>
                        </div>
                        
                        ${task.status === 'downloading' ? `
                            <div class="mt-2">
                                <div class="flex justify-between text-xs text-gray-400 mb-1">
                                    <span>${task.progress.toFixed(1)}%</span>
                                    <span>${task.speed}</span>
                                </div>
                                <div class="h-2 bg-gray-700 rounded-full overflow-hidden">
                                    <div class="progress-bar h-full bg-gradient-to-r from-blue-500 to-purple-500" 
                                         style="width: ${task.progress}%"></div>
                                </div>
                            </div>
                        ` : ''}
                        
                        ${task.status === 'failed' && task.error_message ? `
                            <p class="text-xs text-red-400 mt-2">${task.error_message.substring(0, 100)}</p>
                        ` : ''}
                    </div>
                `).join('');
                
            } catch (e) {
                console.error('Failed to refresh tasks:', e);
            }
        }
        
        // 开始定时刷新
        function startTaskRefresh() {
            refreshTasks();
            refreshInterval = setInterval(refreshTasks, 2000);
        }
        
        // 取消任务
        async function cancelTask(taskId) {
            try {
                await fetch(`/api/tasks/${taskId}/cancel`, {method: 'POST'});
            } catch (e) {
                console.error('Failed to cancel task:', e);
            }
        }
        
        // 清理已完成任务
        async function clearCompleted() {
            try {
                await fetch('/api/tasks', {method: 'DELETE'});
                refreshTasks();
            } catch (e) {
                console.error('Failed to clear tasks:', e);
            }
        }
    </script>
</body>
</html>
