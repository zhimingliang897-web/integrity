<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>视频下载器</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    width: 380px;
    min-height: 120px;
    max-height: 560px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #111118;
    color: #e8e8f0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

/* ── 顶栏 ── */
.topbar {
    display: flex;
    align-items: center;
    padding: 12px 14px 10px;
    gap: 9px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
}
.topbar-icon { font-size: 18px; }
.topbar-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -.01em;
    background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.topbar-count {
    margin-left: auto;
    font-size: 11px;
    color: #555;
}

/* 刷新按钮 */
.btn-refresh {
    background: none;
    border: none;
    cursor: pointer;
    color: #555;
    font-size: 14px;
    padding: 3px 5px;
    border-radius: 5px;
    transition: all .2s;
    line-height: 1;
}
.btn-refresh:hover { color: #a78bfa; background: rgba(167,139,250,0.1); }
.btn-refresh.spinning { animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 视频列表 ── */
.list {
    overflow-y: auto;
    flex: 1;
    padding: 8px 10px;
}
.list::-webkit-scrollbar { width: 4px; }
.list::-webkit-scrollbar-track { background: transparent; }
.list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

/* 空状态 */
.empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 20px 24px;
    gap: 8px;
    color: #444;
}
.empty-icon { font-size: 36px; filter: grayscale(1); opacity:.5; }
.empty-title { font-size: 13px; font-weight: 600; color: #555; }
.empty-hint  { font-size: 11px; color: #3a3a4a; text-align: center; line-height: 1.5; }

/* 视频卡片 */
.vcard {
    display: flex;
    align-items: stretch;
    gap: 0;
    margin-bottom: 6px;
    background: rgba(255,255,255,0.038);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color .2s;
}
.vcard:last-child { margin-bottom: 0; }
.vcard:hover { border-color: rgba(139,92,246,0.35); }

/* 左侧色块（格式标识） */
.vcard-stripe {
    width: 4px;
    flex-shrink: 0;
}
.stripe-m3u8 { background: linear-gradient(#10b981, #059669); }
.stripe-mp4  { background: linear-gradient(#3b82f6, #2563eb); }
.stripe-webm { background: linear-gradient(#f59e0b, #d97706); }
.stripe-flv  { background: linear-gradient(#ef4444, #dc2626); }
.stripe-other{ background: linear-gradient(#6b7280, #4b5563); }

.vcard-body {
    flex: 1;
    padding: 9px 10px;
    min-width: 0;
}

/* 行1：格式标签 + 文件大小 */
.vcard-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
}
.tag {
    font-size: 9px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: .06em;
    padding: 2px 5px;
    border-radius: 4px;
}
.tag-m3u8 { background: rgba(16,185,129,.2);  color: #6ee7b7; }
.tag-mp4  { background: rgba(59,130,246,.2);  color: #93c5fd; }
.tag-webm { background: rgba(245,158,11,.2);  color: #fcd34d; }
.tag-flv  { background: rgba(239,68,68,.2);   color: #fca5a5; }
.tag-ts   { background: rgba(139,92,246,.2);  color: #c4b5fd; }
.tag-other{ background: rgba(107,114,128,.2); color: #9ca3af; }

.vcard-size { font-size: 10px; color: #4b5563; }
.vcard-source { font-size: 10px; color: #374151; margin-left: auto; }

/* 行2：URL */
.vcard-url {
    font-size: 11px;
    color: #6b7280;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: 'SF Mono', 'Fira Code', monospace;
    cursor: default;
}

/* 右侧按钮区 */
.vcard-actions {
    display: flex;
    flex-direction: column;
    border-left: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
}

.vbtn {
    flex: 1;
    padding: 0 12px;
    border: none;
    background: none;
    color: #6b7280;
    font-size: 12px;
    cursor: pointer;
    transition: all .18s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    white-space: nowrap;
    min-width: 72px;
}
.vbtn:first-child {
    border-bottom: 1px solid rgba(255,255,255,0.06);
}
.vbtn:hover { background: rgba(139,92,246,0.15); color: #c4b5fd; }
.vbtn.dl-direct:hover { background: rgba(16,185,129,0.15); color: #6ee7b7; }
.vbtn.dl-cmd:hover    { background: rgba(59,130,246,0.15);  color: #93c5fd; }
.vbtn.copied { color: #6ee7b7 !important; background: rgba(16,185,129,.1) !important; }

/* ── 底部工具栏 ── */
.bottombar {
    flex-shrink: 0;
    padding: 8px 10px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    gap: 6px;
}
.btn-bottom {
    flex: 1;
    padding: 7px 0;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 7px;
    color: #6b7280;
    font-size: 11px;
    cursor: pointer;
    transition: all .2s;
}
.btn-bottom:hover { background: rgba(139,92,246,.12); color:#c4b5fd; border-color: rgba(139,92,246,.3); }

/* 小 toast */
.minitoast {
    position: fixed;
    bottom: 52px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: rgba(20,20,30,0.95);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    color: #e8e8f0;
    font-size: 12px;
    padding: 7px 16px;
    border-radius: 20px;
    white-space: nowrap;
    opacity: 0;
    transition: all .25s ease;
    pointer-events: none;
    z-index: 999;
}
.minitoast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<div class="topbar">
    <span class="topbar-icon">📡</span>
    <span class="topbar-title">视频嗅探器</span>
    <span class="topbar-count" id="countLabel">–</span>
    <button class="btn-refresh" id="refreshBtn" title="重新扫描">↻</button>
</div>

<div class="list" id="list">
    <div class="empty" id="emptyState">
        <div class="empty-icon">🎬</div>
        <div class="empty-title">未检测到视频</div>
        <div class="empty-hint">请先在页面上播放视频<br>或等待视频加载后点击 ↻ 刷新</div>
    </div>
</div>

<div class="minitoast" id="toast"></div>

<div class="bottombar">
    <button class="btn-bottom" id="btnCopyAll">📋 复制全部命令</button>
    <button class="btn-bottom" id="btnOpenDir">📂 下载文件夹</button>
</div>

<script src="popup.js"></script>
</body>
</html>
