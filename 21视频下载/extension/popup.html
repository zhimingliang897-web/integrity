<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>21视频下载器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 320px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 16px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 16px;
        }
        
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 12px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .status-dot.online {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }
        
        .status-dot.offline {
            background: #ef4444;
        }
        
        .video-info {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
        }
        
        .video-info .label {
            font-size: 10px;
            color: #9ca3af;
            margin-bottom: 4px;
        }
        
        .video-info .value {
            font-size: 13px;
            color: #e5e7eb;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .btn-download {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-download:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-download .spinner {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .message {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-top: 12px;
        }
        
        .message.success {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
        
        .message.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        
        .message.info {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }
        
        .footer {
            text-align: center;
            margin-top: 16px;
            font-size: 10px;
            color: #6b7280;
        }
        
        .footer a {
            color: #9ca3af;
            text-decoration: none;
        }

        .btn-capture {
            width: 100%;
            padding: 10px;
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.4);
            border-radius: 8px;
            color: #10b981;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-capture:hover {
            background: rgba(16, 185, 129, 0.35);
        }

        .btn-capture:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📥 21视频下载器</h1>
    </div>
    
    <div class="status-indicator">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">检查服务状态...</span>
    </div>
    
    <div class="video-info">
        <div class="label">当前页面</div>
        <div class="value" id="pageUrl">获取中...</div>
    </div>
    
    <div class="video-info" id="videoTitleContainer" style="display: none;">
        <div class="label">视频标题</div>
        <div class="value" id="videoTitle">-</div>
    </div>
    
    <button class="btn-download" id="downloadBtn" disabled>
        <i class="fas fa-download"></i>
        发送到下载器
    </button>

    <button class="btn-capture" id="captureBtn" disabled>
        🍪 自动获取浏览器Cookie
    </button>

    <div class="message" id="message" style="display: none;"></div>
    
    <div class="footer">
        <a href="#" id="openWeb">打开Web界面</a>
    </div>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="popup.js"></script>
</body>
</html>
