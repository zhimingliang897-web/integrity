version: '3.8'

services:
  api:
    build: .
    container_name: integrity-api
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-integrity-lab-secret-2026}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - INVITE_CODES=${INVITE_CODES:-demo2026,test2026}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3