<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token 计算 - Integrity Tools</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; padding: 80px 20px 40px; }
        h1 { text-align: center; margin-bottom: 30px; }
        .card { background: #1a1a2e; border: 1px solid #2a2a3a; border-radius: 12px; padding: 25px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; color: #888; }
        .form-group select, .form-group input { width: 100%; padding: 12px; background: #0f0f1a; border: 1px solid #2a2a3a; border-radius: 8px; color: #fff; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .result { display: flex; justify-content: space-around; text-align: center; margin-top: 20px; }
        .result-item { }
        .result-item .value { font-size: 2rem; font-weight: bold; color: #667eea; }
        .result-item .label { font-size: 0.85rem; color: #888; }
        .nav { position: fixed; top: 0; left: 0; right: 0; background: rgba(15, 15, 26, 0.9); padding: 15px 20px; border-bottom: 1px solid #2a2a3a; }
        .nav a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/">← 返回首页</a>
    </nav>
    
    <div class="container">
        <h1>🪙 Token 计算</h1>
        
        <div class="card">
            <div class="form-group">
                <label>模型</label>
                <select id="model">
                    <option value="qwen-plus">Qwen-Plus</option>
                    <option value="qwen-turbo">Qwen-Turbo</option>
                    <option value="qwen-max">Qwen-Max</option>
                    <option value="gpt-4o">GPT-4o</option>
                    <option value="deepseek-chat">DeepSeek</option>
                </select>
            </div>
            <div class="form-group">
                <label>语言</label>
                <select id="lang">
                    <option value="zh">中文</option>
                    <option value="en">英文</option>
                </select>
            </div>
            <div class="form-group">
                <label>字符数</label>
                <input type="number" id="chars" value="100" min="1">
            </div>
            <button class="btn" onclick="calcTokens()">计算</button>
            
            <div class="result" id="result" style="display:none;">
                <div class="result-item">
                    <div class="value" id="prompt-tokens">-</div>
                    <div class="label">输入 Token</div>
                </div>
                <div class="result-item">
                    <div class="value" id="completion-tokens">-</div>
                    <div class="label">输出 Token</div>
                </div>
                <div class="result-item">
                    <div class="value" id="total-cost">-</div>
                    <div class="label">预估费用 ($)</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        async function calcTokens() {
            const model = document.getElementById('model').value;
            const lang = document.getElementById('lang').value;
            const chars = parseInt(document.getElementById('chars').value);
            
            const res = await fetch('/api/tokens/calc', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model, lang, chars })
            });
            const data = await res.json();
            
            document.getElementById('result').style.display = 'flex';
            document.getElementById('prompt-tokens').textContent = data.prompt_tokens;
            document.getElementById('completion-tokens').textContent = data.completion_tokens;
            document.getElementById('total-cost').textContent = data.total_cost.toFixed(6);
        }
    </script>
</body>
</html>
