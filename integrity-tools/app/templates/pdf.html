<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 工具集 - Integrity Tools</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 80px 20px 40px; }
        h1 { text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; justify-content: center; }
        .tab { padding: 10px 16px; background: #1a1a2e; border: 1px solid #2a2a3a; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-size: 14px; }
        .tab:hover { background: #2a2a3a; }
        .tab.active { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border-color: #667eea; }
        .panel { display: none; background: #1a1a2e; border: 1px solid #2a2a3a; border-radius: 12px; padding: 24px; }
        .panel.active { display: block; }
        .panel h3 { color: #fff; margin-bottom: 16px; }
        .panel p { color: #888; margin-bottom: 16px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; color: #aaa; font-weight: 500; }
        input[type="file"] { width: 100%; padding: 12px; border: 2px dashed #2a2a3a; border-radius: 8px; background: #0f0f1a; cursor: pointer; color: #888; }
        input[type="file"]:hover { border-color: #667eea; }
        input[type="number"], input[type="text"] { width: 100%; padding: 10px; border: 1px solid #2a2a3a; border-radius: 6px; font-size: 14px; background: #0f0f1a; color: #fff; }
        select { width: 100%; padding: 10px; border: 1px solid #2a2a3a; border-radius: 6px; font-size: 14px; background: #1a1a2e; color: #fff; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; }
        .checkbox-group input { width: 18px; height: 18px; }
        .btn { padding: 12px 24px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: all 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { background: #444; cursor: not-allowed; transform: none; }
        .result { margin-top: 16px; padding: 12px; border-radius: 8px; display: none; }
        .result.success { display: block; background: rgba(34, 197, 94, 0.1); color: #22c55e; border: 1px solid #22c55e; }
        .result.error { display: block; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; }
        .download-link { display: inline-block; margin-top: 10px; padding: 10px 20px; background: #22c55e; color: #fff; text-decoration: none; border-radius: 6px; }
        .download-link:hover { background: #16a34a; }
        .info-box { background: rgba(102, 126, 234, 0.1); padding: 12px; border-radius: 6px; margin-bottom: 16px; color: #667eea; display: none; }
        .row { display: flex; gap: 16px; }
        .row > * { flex: 1; }
        .loading { display: none; color: #888; margin-left: 10px; }
        .nav { position: fixed; top: 0; left: 0; right: 0; background: rgba(15, 15, 26, 0.9); padding: 15px 20px; border-bottom: 1px solid #2a2a3a; }
        .nav a { color: #667eea; text-decoration: none; }
        @media (max-width: 600px) { .row { flex-direction: column; } .tabs { justify-content: center; } .tab { font-size: 12px; padding: 8px 10px; } }
    </style>
</head>
<body>
    <nav class="nav"><a href="/">← 返回首页</a></nav>
    <div class="container">
        <h1>📄 PDF 工具集</h1>
        <p class="subtitle">一站式 PDF 处理工具</p>

        <div class="tabs">
            <div class="tab active" data-tab="tab1">图片转PDF</div>
            <div class="tab" data-tab="tab2">PDF合并</div>
            <div class="tab" data-tab="tab3">删除页面</div>
            <div class="tab" data-tab="tab4">页面重排</div>
        </div>

        <div class="panel active" id="tab1">
            <h3>图片转 PDF</h3>
            <p>将多张图片合成为一个 PDF 文件</p>
            <form id="form1" enctype="multipart/form-data">
                <div class="form-group">
                    <label>上传图片（可多选）</label>
                    <input type="file" name="images" multiple accept="image/*" required>
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" name="force_landscape" id="landscape1">
                    <label for="landscape1">强制横向（竖图自动旋转）</label>
                </div>
                <button type="submit" class="btn">生成 PDF</button>
                <span class="loading" id="loading1">处理中...</span>
            </form>
            <div class="result" id="result1"></div>
        </div>

        <div class="panel" id="tab2">
            <h3>PDF 合并</h3>
            <p>将多个 PDF 文件按顺序合并为一个</p>
            <form id="form2" enctype="multipart/form-data">
                <div class="form-group">
                    <label>上传 PDF 文件（可多选，按选择顺序合并）</label>
                    <input type="file" name="pdfs" multiple accept=".pdf" required>
                </div>
                <button type="submit" class="btn">合并 PDF</button>
                <span class="loading" id="loading2">处理中...</span>
            </form>
            <div class="result" id="result2"></div>
        </div>

        <div class="panel" id="tab3">
            <h3>删除页面</h3>
            <p>删除 PDF 中指定的页面</p>
            <form id="form3" enctype="multipart/form-data">
                <div class="form-group">
                    <label>上传 PDF 文件</label>
                    <input type="file" name="pdf" accept=".pdf" required>
                </div>
                <div class="info-box" id="info3"></div>
                <div class="form-group">
                    <label>要删除的页码</label>
                    <input type="text" name="pages" placeholder="支持格式：1,3,5 或 1-5 或 1,3-5,8" required>
                </div>
                <button type="submit" class="btn">删除页面</button>
                <span class="loading" id="loading3">处理中...</span>
            </form>
            <div class="result" id="result3"></div>
        </div>

        <div class="panel" id="tab4">
            <h3>页面重排</h3>
            <p>将竖版页面排到横版页面前面</p>
            <form id="form4" enctype="multipart/form-data">
                <div class="form-group">
                    <label>上传 PDF 文件</label>
                    <input type="file" name="pdf" accept=".pdf" required>
                </div>
                <button type="submit" class="btn">重排页面</button>
                <span class="loading" id="loading4">处理中...</span>
            </form>
            <div class="result" id="result4"></div>
        </div>
    </div>

    <script>
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active');
            });
        });

        const endpoints = {
            form1: '/api/pdf/images_to_pdf',
            form2: '/api/pdf/merge',
            form3: '/api/pdf/remove_pages',
            form4: '/api/pdf/remove_pages',
        };

        document.getElementById('form3').querySelector('input[name="pdf"]').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('pdf', file);
            try {
                const res = await fetch('/api/pdf/info', { method: 'POST', body: formData });
                const data = await res.json();
                const infoBox = document.getElementById('info3');
                infoBox.style.display = 'block';
                infoBox.textContent = data.info;
            } catch (e) { console.error(e); }
        });

        Object.keys(endpoints).forEach(formId => {
            document.getElementById(formId).addEventListener('submit', async (e) => {
                e.preventDefault();
                const form = e.target;
                const resultDiv = document.getElementById('result' + formId.slice(-1));
                const loading = document.getElementById('loading' + formId.slice(-1));
                const btn = form.querySelector('.btn');

                loading.style.display = 'inline';
                btn.disabled = true;
                resultDiv.className = 'result';
                resultDiv.innerHTML = '';

                const formData = new FormData(form);
                try {
                    const res = await fetch(endpoints[formId], { method: 'POST', body: formData });
                    const data = await res.json();
                    if (data.success) {
                        resultDiv.className = 'result success';
                        resultDiv.innerHTML = data.message + '<br><a class="download-link" href="' + data.download_url + '" download>下载文件</a>';
                    } else {
                        resultDiv.className = 'result error';
                        resultDiv.textContent = data.message;
                    }
                } catch (err) {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = '请求失败：' + err.message;
                }
                loading.style.display = 'none';
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
