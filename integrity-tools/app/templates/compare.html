<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 模型对比 - Integrity Tools</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 80px 20px 40px; }
        h1 { text-align: center; margin-bottom: 30px; }
        .card { background: #1a1a2e; border: 1px solid #2a2a3a; border-radius: 12px; padding: 25px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; color: #888; }
        .form-group textarea { width: 100%; padding: 12px; background: #0f0f1a; border: 1px solid #2a2a3a; border-radius: 8px; color: #fff; min-height: 80px; resize: vertical; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .checkbox-group label { display: flex; align-items: center; gap: 5px; padding: 8px 15px; background: #0f0f1a; border: 1px solid #2a2a3a; border-radius: 6px; cursor: pointer; }
        .checkbox-group input:checked + span { color: #667eea; }
        .btn { padding: 12px 30px; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .results { display: grid; gap: 15px; margin-top: 20px; }
        .result-item { background: #0f0f1a; border: 1px solid #2a2a3a; border-radius: 8px; padding: 15px; }
        .result-item .header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .result-item .model-name { font-weight: bold; color: #667eea; }
        .result-item .latency { color: #888; font-size: 0.85rem; }
        .result-item .content { line-height: 1.6; white-space: pre-wrap; }
        .nav { position: fixed; top: 0; left: 0; right: 0; background: rgba(15, 15, 26, 0.9); padding: 15px 20px; border-bottom: 1px solid #2a2a3a; }
        .nav a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/">← 返回首页</a>
    </nav>
    
    <div class="container">
        <h1>⚖️ AI 模型对比</h1>
        
        <div class="card">
            <div class="form-group">
                <label>问题</label>
                <textarea id="question" placeholder="输入问题...">什么是大语言模型？</textarea>
            </div>
            <div class="form-group">
                <label>选择模型</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="model" value="qwen" checked><span>Qwen</span></label>
                    <label><input type="checkbox" name="model" value="doubao"><span>Doubao</span></label>
                    <label><input type="checkbox" name="model" value="kimi"><span>Kimi</span></label>
                    <label><input type="checkbox" name="model" value="deepseek"><span>DeepSeek</span></label>
                </div>
            </div>
            <button class="btn" onclick="compare()">开始对比</button>
            
            <div class="results" id="results"></div>
        </div>
    </div>
    
    <script>
        const token = localStorage.getItem('token');
        
        async function compare() {
            const question = document.getElementById('question').value.trim();
            const checkboxes = document.querySelectorAll('input[name="model"]:checked');
            const models = Array.from(checkboxes).map(cb => cb.value);
            
            if (!question || models.length === 0) {
                alert('请输入问题并选择至少一个模型');
                return;
            }
            
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p style="text-align:center;">对比中...</p>';
            
            const res = await fetch('/api/compare', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({ question, requests: models.map(m => ({ name: m })) })
            });
            const data = await res.json();
            
            resultsDiv.innerHTML = '';
            for (const result of data.results) {
                const div = document.createElement('div');
                div.className = 'result-item';
                if (result.error) {
                    div.innerHTML = `<div class="header"><span class="model-name">${result.name}</span></div><div class="content" style="color:#ef4444;">${result.error}</div>`;
                } else {
                    div.innerHTML = `<div class="header"><span class="model-name">${result.name} (${result.model})</span><span class="latency">${result.latency_ms}ms</span></div><div class="content">${result.content}</div>`;
                }
                resultsDiv.appendChild(div);
            }
        }
    </script>
</body>
</html>
