<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1080px;
            height: 1440px;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
        }
        .emoji-icon {
            font-size: 120px;
            margin-bottom: 60px;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.2));
        }
        .main-title {
            font-size: 96px;
            font-weight: 800;
            color: white;
            text-align: center;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
            margin-bottom: 40px;
            letter-spacing: 8px;
        }
        .sub-title {
            font-size: 48px;
            font-weight: 500;
            color: rgba(255,255,255,0.95);
            text-align: center;
            background: rgba(255,255,255,0.2);
            padding: 20px 50px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }
        .badge {
            position: absolute;
            top: 60px;
            right: 60px;
            background: #ff6b6b;
            color: white;
            padding: 15px 35px;
            border-radius: 30px;
            font-size: 32px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(255,107,107,0.4);
        }
        .watermark {
            position: absolute;
            bottom: 50px;
            font-size: 28px;
            color: rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>
    <div class="badge">实用英语</div>
    <div class="emoji-icon">🍽️</div>
    <div class="main-title">点餐英语</div>
    <div class="sub-title">3句软话+2词搞定</div>
    <div class="watermark">学英语 | 每日一学</div>
</body>
</html>
