<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1080px;
            height: 1440px;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(180deg, #f8f9ff 0%, #e8ecff 100%);
            padding: 60px;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        .slide-number {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
        }
        .scene-title {
            font-size: 42px;
            font-weight: 700;
            color: #333;
            flex: 1;
            margin-left: 30px;
        }
        .comparison-box {
            background: white;
            border-radius: 30px;
            padding: 50px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }
        .wrong-section {
            margin-bottom: 40px;
            padding-bottom: 40px;
            border-bottom: 2px dashed #eee;
        }
        .section-label {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .wrong-label {
            color: #e74c3c;
        }
        .correct-label {
            color: #27ae60;
        }
        .chinese-text {
            font-size: 32px;
            color: #666;
            margin-bottom: 15px;
        }
        .english-text {
            font-size: 40px;
            font-weight: 600;
        }
        .wrong-english {
            color: #e74c3c;
            text-decoration: line-through;
            text-decoration-thickness: 3px;
        }
        .correct-english {
            color: #27ae60;
        }
        .correct-meaning {
            font-size: 28px;
            color: #888;
            margin-top: 10px;
        }
        .dialogue-box {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-radius: 25px;
            padding: 40px;
            margin-bottom: 30px;
            border-left: 6px solid #667eea;
        }
        .dialogue-title {
            font-size: 28px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .dialogue-line {
            margin-bottom: 20px;
        }
        .dialogue-en {
            font-size: 34px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .dialogue-cn {
            font-size: 26px;
            color: #888;
        }
        .tip-box {
            background: linear-gradient(135deg, #fff9e6 0%, #fff3cc 100%);
            border-radius: 20px;
            padding: 30px 40px;
            display: flex;
            align-items: flex-start;
            gap: 20px;
        }
        .tip-icon {
            font-size: 36px;
        }
        .tip-text {
            font-size: 28px;
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="slide-number">1</div>
        <div class="scene-title">进门问空位</div>
    </div>

    <div class="comparison-box">
        <div class="wrong-section">
            <div class="section-label wrong-label">
                <span>&#10060;</span> 中式英语
            </div>
            <div class="chinese-text">有空位吗？（直译）</div>
            <div class="english-text wrong-english">Do you have empty seat?</div>
        </div>

        <div class="correct-section">
            <div class="section-label correct-label">
                <span>&#9989;</span> 地道表达
            </div>
            <div class="english-text correct-english">Is there a table for one/two?</div>
            <div class="correct-meaning">有一人/两人位吗？（自然又礼貌）</div>
        </div>
    </div>

    <div class="dialogue-box">
        <div class="dialogue-title">
            <span>&#128172;</span> 实战对话
        </div>
        <div class="dialogue-line">
            <div class="dialogue-en">A: Hi, is there a table for two?</div>
            <div class="dialogue-cn">A：你好，有两人位吗？</div>
        </div>
        <div class="dialogue-line">
            <div class="dialogue-en">B: Yes! Right by the window — I’ll grab you some napkins!</div>
            <div class="dialogue-cn">B：有！靠窗那边～我马上拿纸巾！</div>
        </div>
    </div>

    <div class="tip-box">
        <div class="tip-icon">&#128161;</div>
        <div class="tip-text">别用empty seat（像在检查仓库😅），用table for X更地道；‘for one/two’比‘available’更日常！</div>
    </div>
</body>
</html>
