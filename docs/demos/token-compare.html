<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token 消耗对比工具 - Integrity Lab</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/tools-styles.css">
    <style>
        .token-compare-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .page-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .page-subtitle {
            color: #888;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }
        
        .input-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #fff;
        }
        
        .input-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .input-tab {
            padding: 10px 20px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: #888;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .input-tab:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .input-tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }
        
        .text-input-area {
            width: 100%;
            min-height: 150px;
            padding: 16px;
            background: #0d0d14;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            line-height: 1.6;
            resize: vertical;
            margin-bottom: 20px;
        }
        
        .text-input-area:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .image-upload-area {
            width: 100%;
            padding: 40px;
            background: #0d0d14;
            border: 2px dashed var(--border);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .image-upload-area:hover {
            border-color: var(--primary);
        }
        
        .image-upload-area.dragover {
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.1);
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .upload-text {
            color: #888;
            font-size: 14px;
        }
        
        .preview-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        .model-selection {
            margin-bottom: 20px;
        }
        
        .model-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }
        
        .model-checkbox {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #0d0d14;
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .model-checkbox:hover {
            border-color: var(--primary);
        }
        
        .model-checkbox input {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }
        
        .model-checkbox.checked {
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.1);
        }
        
        .model-name {
            font-weight: 500;
            color: #fff;
        }
        
        .model-price {
            font-size: 12px;
            color: #888;
            margin-left: auto;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        .btn-primary {
            padding: 14px 32px;
            background: var(--primary);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            background: #5a6fd6;
            transform: translateY(-2px);
        }
        
        .btn-primary:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            padding: 14px 32px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .results-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            display: none;
        }
        
        .results-section.visible {
            display: block;
        }
        
        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .results-table th,
        .results-table td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        
        .results-table th {
            font-weight: 600;
            color: #888;
            font-size: 13px;
            text-transform: uppercase;
        }
        
        .results-table td {
            font-size: 15px;
        }
        
        .results-table tr:hover {
            background: rgba(102, 126, 234, 0.05);
        }
        
        .token-count {
            font-weight: 600;
            color: #fff;
        }
        
        .cost-highlight {
            color: #10b981;
            font-weight: 700;
            font-size: 18px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            border-radius: 10px;
            padding: 16px;
            color: #ef4444;
            margin-top: 20px;
        }
        
        .char-counter {
            text-align: right;
            color: #888;
            font-size: 13px;
            margin-top: -10px;
            margin-bottom: 20px;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #888;
            text-decoration: none;
            margin-bottom: 30px;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: var(--primary);
        }
        
        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
        }

        .comparison-table th,
        .comparison-table td {
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .comparison-table th {
            background: var(--bg-body);
            font-weight: 600;
            color: var(--text-primary);
        }

        .comparison-table td {
            color: var(--text-muted);
        }

        .comparison-table tr:last-child td {
            border-bottom: none;
        }

        .comparison-table .highlight {
            color: #fbbf24;
            font-weight: 600;
        }

        .comparison-table .good {
            color: #10b981;
            font-weight: 600;
        }

        .comparison-table .bad {
            color: #ef4444;
            font-weight: 600;
        }
        
        @media (max-width: 768px) {
            .model-grid {
                grid-template-columns: 1fr;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .btn-primary,
            .btn-secondary {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="token-compare-container">
        <a href="../tools.html" class="back-link">
            <span>←</span> 返回工具库
        </a>
        
        <h1 class="page-title">Token 消耗对比工具</h1>
        <p class="page-subtitle">对比相同文本在不同AI模型下的Token消耗和费用</p>
        
        <!-- 输入区域 -->
        <div class="input-section">
            <h2 class="section-title">输入方式</h2>
            
            <div class="input-tabs">
                <button class="input-tab active" data-mode="zh">📝 中文文本</button>
                <button class="input-tab" data-mode="en">🌐 英文文本</button>
                <button class="input-tab" data-mode="image">🖼️ 图片中文</button>
            </div>
            
            <!-- 文本输入 -->
            <div id="text-input-container">
                <textarea 
                    id="text-input" 
                    class="text-input-area" 
                    placeholder="输入要分析的文本..."
                ></textarea>
                <div class="char-counter">
                    <span id="char-count">0</span> 字符
                </div>
            </div>
            
            <!-- 图片输入 -->
            <div id="image-input-container" style="display: none;">
                <div class="image-upload-area" id="image-upload">
                    <div class="upload-icon">📤</div>
                    <div class="upload-text">
                        点击上传图片或拖拽到此处<br>
                        <small>支持 JPG、PNG、WEBP 格式</small>
                    </div>
                </div>
                <input type="file" id="image-file" accept="image/*" style="display: none;">
                <img id="preview-image" class="preview-image" style="display: none;">
            </div>
        </div>
        
        <!-- 模型选择 -->
        <div class="input-section">
            <h2 class="section-title">选择模型</h2>
            <div class="model-selection">
                <div class="model-grid">
                    <div class="model-checkbox" data-model="qwen-turbo">
                        <input type="checkbox" id="cb-turbo" checked>
                        <span class="model-name">Qwen-Turbo</span>
                        <span class="model-price">¥0.0003/1K</span>
                    </div>
                    <div class="model-checkbox" data-model="qwen-plus">
                        <input type="checkbox" id="cb-plus">
                        <span class="model-name">Qwen-Plus</span>
                        <span class="model-price">¥0.0008/1K</span>
                    </div>
                    <div class="model-checkbox" data-model="qwen-max">
                        <input type="checkbox" id="cb-max">
                        <span class="model-name">Qwen-Max</span>
                        <span class="model-price">¥0.002/1K</span>
                    </div>
                    <div class="model-checkbox" data-model="qwen-vl-plus">
                        <input type="checkbox" id="cb-vl">
                        <span class="model-name">Qwen-VL-Plus</span>
                        <span class="model-price">¥0.002/1K</span>
                    </div>
                    <div class="model-checkbox" data-model="gpt-4o">
                        <input type="checkbox" id="cb-gpt4o">
                        <span class="model-name">GPT-4o</span>
                        <span class="model-price">¥0.0175/1K</span>
                    </div>
                    <div class="model-checkbox" data-model="gpt-4o-mini">
                        <input type="checkbox" id="cb-gpt4o-mini">
                        <span class="model-name">GPT-4o-mini</span>
                        <span class="model-price">¥0.0025/1K</span>
                    </div>
                </div>
            </div>
            
            <div class="action-buttons">
                <button id="analyze-btn" class="btn-primary">
                    开始分析
                </button>
                <button id="clear-btn" class="btn-secondary">
                    清空
                </button>
            </div>
        </div>
        
        <!-- 加载中 -->
        <div id="loading-section" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>正在计算Token消耗...</p>
        </div>
        
        <!-- 错误提示 -->
        <div id="error-section" class="error-message" style="display: none;">
        </div>
        
        <!-- 结果展示 -->
        <div id="results-section" class="results-section">
            <h2 class="section-title">对比结果</h2>
            <table class="results-table">
                <thead>
                    <tr>
                        <th>模型</th>
                        <th>输入 Token</th>
                        <th>输出 Token (估算)</th>
                        <th>总计 Token</th>
                        <th>预估费用</th>
                    </tr>
                </thead>
                <tbody id="results-body">
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        // API基础URL
        const API_BASE = 'http://8.138.164.133:5000';
        
        // 当前输入模式
        let currentMode = 'zh';
        
        // DOM元素
        const textInput = document.getElementById('text-input');
        const charCount = document.getElementById('char-count');
        const imageUpload = document.getElementById('image-upload');
        const imageFile = document.getElementById('image-file');
        const previewImage = document.getElementById('preview-image');
        const analyzeBtn = document.getElementById('analyze-btn');
        const clearBtn = document.getElementById('clear-btn');
        const loadingSection = document.getElementById('loading-section');
        const errorSection = document.getElementById('error-section');
        const resultsSection = document.getElementById('results-section');
        const resultsBody = document.getElementById('results-body');
        
        // 输入模式切换
        document.querySelectorAll('.input-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.input-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                currentMode = tab.dataset.mode;
                
                if (currentMode === 'image') {
                    document.getElementById('text-input-container').style.display = 'none';
                    document.getElementById('image-input-container').style.display = 'block';
                } else {
                    document.getElementById('text-input-container').style.display = 'block';
                    document.getElementById('image-input-container').style.display = 'none';
                }
            });
        });
        
        // 字符计数
        textInput.addEventListener('input', () => {
            charCount.textContent = textInput.value.length;
        });
        
        // 模型选择
        document.querySelectorAll('.model-checkbox').forEach(checkbox => {
            checkbox.addEventListener('click', (e) => {
                if (e.target.type !== 'checkbox') {
                    const input = checkbox.querySelector('input');
                    input.checked = !input.checked;
                }
                checkbox.classList.toggle('checked', checkbox.querySelector('input').checked);
            });
        });
        
        // 图片上传
        imageUpload.addEventListener('click', () => {
            imageFile.click();
        });
        
        imageUpload.addEventListener('dragover', (e) => {
            e.preventDefault();
            imageUpload.classList.add('dragover');
        });
        
        imageUpload.addEventListener('dragleave', () => {
            imageUpload.classList.remove('dragover');
        });
        
        imageUpload.addEventListener('drop', (e) => {
            e.preventDefault();
            imageUpload.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleImageFile(file);
            }
        });
        
        imageFile.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                handleImageFile(e.target.files[0]);
            }
        });
        
        function handleImageFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewImage.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
        
        // 开始分析
        analyzeBtn.addEventListener('click', async () => {
            // 获取输入
            let text = '';
            if (currentMode === 'image') {
                if (!previewImage.src || previewImage.style.display === 'none') {
                    showError('请先上传图片');
                    return;
                }
                // 图片模式使用占位符文本（后端会处理）
                text = 'image_content';
            } else {
                text = textInput.value.trim();
                if (!text) {
                    showError('请输入要分析的文本');
                    return;
                }
            }
            
            // 获取选中的模型
            const selectedModels = [];
            document.querySelectorAll('.model-checkbox input:checked').forEach(cb => {
                selectedModels.push(cb.closest('.model-checkbox').dataset.model);
            });
            
            if (selectedModels.length === 0) {
                showError('请至少选择一个模型');
                return;
            }
            
            // 图片模式只支持qwen-vl-plus
            if (currentMode === 'image') {
                const hasVL = selectedModels.includes('qwen-vl-plus');
                if (!hasVL) {
                    showError('图片模式只支持 Qwen-VL-Plus 模型');
                    return;
                }
            }
            
            // 显示加载
            showLoading();
            hideError();
            
            try {
                const response = await fetch(`${API_BASE}/api/tokens/compare`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        text: text,
                        language: currentMode,
                        models: selectedModels
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showResults(data.results);
                } else {
                    showError(data.error || '分析失败');
                }
            } catch (error) {
                showError('网络错误，请稍后重试');
                console.error(error);
            } finally {
                hideLoading();
            }
        });
        
        // 清空
        clearBtn.addEventListener('click', () => {
            textInput.value = '';
            charCount.textContent = '0';
            previewImage.src = '';
            previewImage.style.display = 'none';
            hideError();
            resultsSection.classList.remove('visible');
        });
        
        // 显示加载
        function showLoading() {
            loadingSection.style.display = 'block';
            analyzeBtn.disabled = true;
        }
        
        // 隐藏加载
        function hideLoading() {
            loadingSection.style.display = 'none';
            analyzeBtn.disabled = false;
        }
        
        // 显示错误
        function showError(message) {
            errorSection.textContent = message;
            errorSection.style.display = 'block';
        }
        
        // 隐藏错误
        function hideError() {
            errorSection.style.display = 'none';
        }
        
        // 显示结果
        function showResults(results) {
            resultsBody.innerHTML = results.map(r => `
                <tr>
                    <td>
                        <strong style="color: #fff;">${r.model}</strong>
                    </td>
                    <td class="token-count">${r.prompt_tokens.toLocaleString()}</td>
                    <td class="token-count">${r.completion_tokens.toLocaleString()}</td>
                    <td class="token-count">${r.total_tokens.toLocaleString()}</td>
                    <td class="cost-highlight">¥${r.estimated_cost.toFixed(4)}</td>
                </tr>
            `).join('');
            
            resultsSection.classList.add('visible');
        }
    </script>
</body>
</html>
