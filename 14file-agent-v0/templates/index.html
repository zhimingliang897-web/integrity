<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文件助手 Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0d0f14;
        --surface: #161922;
        --surface2: #1e2230;
        --border: #2a2f42;
        --accent: #6c63ff;
        --accent2: #4ecdc4;
        --text: #e8eaf0;
        --text-dim: #8892a4;
        --user-bubble: #6c63ff20;
        --agent-bubble: #1e2230;
        --success: #4ecdc4;
        --error: #ff6b6b;
        --file-card: #1a1e2b;
        --radius: 14px;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── HEADER ── */
      header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 14px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
      }
      .logo {
        width: 40px;
        height: 40px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        flex-shrink: 0;
      }
      header h1 {
        font-size: 16px;
        font-weight: 600;
        color: var(--text);
      }
      header p {
        font-size: 12px;
        color: var(--text-dim);
        margin-top: 2px;
      }
      .header-right {
        margin-left: auto;
        display: flex;
        gap: 8px;
      }
      .btn-icon {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 6px 10px;
        color: var(--text-dim);
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-icon:hover {
        color: var(--text);
        border-color: var(--accent);
      }

      /* ── CHAT AREA ── */
      #chat {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        scroll-behavior: smooth;
      }
      #chat::-webkit-scrollbar {
        width: 4px;
      }
      #chat::-webkit-scrollbar-track {
        background: transparent;
      }
      #chat::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }

      /* ── MESSAGES ── */
      .msg {
        display: flex;
        gap: 10px;
        animation: fadeUp 0.3s ease;
        max-width: 100%;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .msg.user {
        flex-direction: row-reverse;
      }
      .avatar {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }
      .msg.agent .avatar {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
      }
      .msg.user .avatar {
        background: var(--surface2);
        border: 1px solid var(--border);
      }
      .bubble {
        max-width: min(600px, 85%);
        padding: 12px 16px;
        border-radius: var(--radius);
        line-height: 1.6;
        font-size: 14px;
        word-break: break-word;
      }
      .msg.agent .bubble {
        background: var(--agent-bubble);
        border: 1px solid var(--border);
        border-top-left-radius: 4px;
      }
      .msg.user .bubble {
        background: var(--user-bubble);
        border: 1px solid #6c63ff40;
        border-top-right-radius: 4px;
      }

      /* ── FILE CARDS ── */
      .file-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 10px;
      }
      .file-card {
        background: var(--file-card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
        user-select: none;
      }
      .file-card:hover {
        border-color: var(--accent);
        background: #1e2230;
      }
      .file-card.selected {
        border-color: var(--accent);
        background: #6c63ff18;
      }
      .file-icon {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
      }
      .file-info {
        flex: 1;
        min-width: 0;
      }
      .file-name {
        font-size: 13px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .file-path {
        font-size: 11px;
        color: var(--text-dim);
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        direction: rtl; /* Truncate left side of path if too long */
        text-align: left;
      }
      .file-meta {
        font-size: 11px;
        color: var(--text-dim);
        margin-top: 4px;
      }
      .file-meta span {
        margin-right: 10px;
      }
      .file-actions {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
      }
      .btn-small {
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 500;
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--text-dim);
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
      }
      .btn-small:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .btn-small.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
      .btn-small.primary:hover {
        background: #5a52d5;
      }

      /* ── SELECTION BAR ── */
      #selection-bar {
        background: var(--surface2);
        border-top: 1px solid var(--accent);
        padding: 10px 20px;
        display: none;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        flex-shrink: 0;
      }
      #selection-bar.visible {
        display: flex;
      }
      #selection-bar .sel-info {
        flex: 1;
        color: var(--text-dim);
      }
      #selection-bar .sel-info strong {
        color: var(--text);
      }

      /* ── EMAIL MODAL ── */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: #000a;
        z-index: 100;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.visible {
        display: flex;
      }
      .modal {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 28px;
        width: min(440px, 92vw);
        animation: fadeUp 0.25s ease;
      }
      .modal h2 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .modal p {
        font-size: 13px;
        color: var(--text-dim);
        margin-bottom: 16px;
      }
      .modal input,
      .modal textarea {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 14px;
        color: var(--text);
        font-family: inherit;
        font-size: 13px;
        outline: none;
        transition: border-color 0.2s;
      }
      .modal input:focus,
      .modal textarea:focus {
        border-color: var(--accent);
      }
      .modal textarea {
        height: 80px;
        resize: none;
        margin-top: 10px;
      }
      .modal-label {
        font-size: 12px;
        color: var(--text-dim);
        margin-bottom: 6px;
      }
      .modal-actions {
        display: flex;
        gap: 8px;
        margin-top: 18px;
        justify-content: flex-end;
      }
      .btn {
        padding: 9px 20px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        border: 1px solid transparent;
        transition: all 0.2s;
      }
      .btn.primary {
        background: var(--accent);
        color: #fff;
      }
      .btn.primary:hover {
        background: #5a52d5;
      }
      .btn.ghost {
        background: transparent;
        border-color: var(--border);
        color: var(--text-dim);
      }
      .btn.ghost:hover {
        border-color: var(--accent);
        color: var(--text);
      }

      /* ── INPUT BAR ── */
      #input-bar {
        background: var(--surface);
        border-top: 1px solid var(--border);
        padding: 14px 16px;
        display: flex;
        gap: 10px;
        align-items: flex-end;
        flex-shrink: 0;
      }
      #msg-input {
        flex: 1;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 16px;
        color: var(--text);
        font-family: inherit;
        font-size: 14px;
        resize: none;
        outline: none;
        max-height: 120px;
        overflow-y: auto;
        line-height: 1.5;
        transition: border-color 0.2s;
      }
      #msg-input:focus {
        border-color: var(--accent);
      }
      #msg-input::placeholder {
        color: var(--text-dim);
      }
      #send-btn {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        background: var(--accent);
        border: none;
        color: #fff;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.2s,
          transform 0.1s;
        flex-shrink: 0;
      }
      #send-btn:hover {
        background: #5a52d5;
      }
      #send-btn:active {
        transform: scale(0.93);
      }
      #send-btn:disabled {
        background: var(--border);
        cursor: not-allowed;
      }

      /* ── TYPING / PROGRESS ── */
      .typing {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 12px 16px;
        min-width: 200px;
      }
      .typing-dots {
        display: flex;
        gap: 5px;
        align-items: center;
      }
      .typing-dots span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--text-dim);
        display: inline-block;
        animation: bounce 1.2s infinite;
      }
      .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
      .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes bounce {
        0%, 80%, 100% { transform: translateY(0); }
        40% { transform: translateY(-6px); }
      }
      .progress-text {
        font-size: 12px;
        color: var(--text-dim);
        line-height: 1.4;
        word-break: break-all;
      }
      .progress-count {
        font-size: 11px;
        font-weight: 600;
        color: var(--accent);
        margin-top: 2px;
      }

      /* ── QUICK TIPS ── */
      .quick-tips {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 6px;
      }
      .tip-btn {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 5px 12px;
        font-size: 12px;
        color: var(--text-dim);
        cursor: pointer;
        transition: all 0.2s;
      }
      .tip-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* ── BROWSE PANEL ── */
      .browse-panel {
        margin-top: 10px;
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
      }
      .browse-path-bar {
        background: var(--surface2);
        padding: 8px 14px;
        font-size: 12px;
        color: var(--text-dim);
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .browse-list {
        max-height: 320px;
        overflow-y: auto;
      }
      .browse-list::-webkit-scrollbar { width: 4px; }
      .browse-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
      .browse-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 14px;
        border-bottom: 1px solid #1e2230;
        cursor: pointer;
        font-size: 13px;
        transition: background 0.15s;
      }
      .browse-item:last-child { border-bottom: none; }
      .browse-item:hover { background: var(--surface2); }
      .browse-item.is-dir { color: var(--text); }
      .browse-item.is-file { color: var(--text-dim); }
      .browse-item .bi-icon { font-size: 16px; flex-shrink: 0; width: 22px; text-align: center; }
      .browse-item .bi-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .browse-item .bi-meta { font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
      .browse-item .bi-actions { display: flex; gap: 4px; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; }
      .browse-item:hover .bi-actions { opacity: 1; }

      /* ── TOAST ── */
      #toast {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 18px;
        font-size: 13px;
        opacity: 0;
        transition: all 0.3s;
        pointer-events: none;
        white-space: nowrap;
        z-index: 200;
      }
      #toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      #toast.success {
        border-color: var(--success);
        color: var(--success);
      }
      #toast.error {
        border-color: var(--error);
        color: var(--error);
      }

      @media (max-width: 480px) {
        header {
          padding: 10px 14px;
        }
        #chat {
          padding: 14px;
        }
        .bubble {
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <!-- HEADER -->
    <header>
      <div class="logo">🔍</div>
      <div>
        <h1>文件助手 Agent</h1>
        <p>用自然语言找到你的文件，发到你的邮箱</p>
      </div>
      <div class="header-right">
        <button class="btn-icon" onclick="window.open('/settings', '_blank')" title="偏好设置">⚙️ 设置</button>
        <button class="btn-icon" onclick="resetChat()" title="清除对话">
          🗑 重置
        </button>
      </div>
    </header>

    <!-- CHAT -->
    <div id="chat">
      <div class="msg agent">
        <div class="avatar">🤖</div>
        <div>
          <div class="bubble">
            你好！我是文件助手。<br />
            告诉我你想找什么文件，我会帮你搜索电脑。找到后可以直接发到邮箱！
          </div>
          <div class="quick-tips" style="margin-top: 8px">
            <button class="tip-btn" onclick="sendQuick('帮我找一下简历')">📄 找简历</button>
            <button class="tip-btn" onclick="sendQuick('搜索PDF文件')">📕 搜索 PDF</button>
            <button class="tip-btn" onclick="sendQuick('找所有mp4视频，最多找50个')">🎬 找所有MP4 (限50)</button>
            <button class="tip-btn" onclick="sendQuick('找最近修改的图片')">🖼 找图片</button>
            <button class="tip-btn" onclick="sendQuick('看看我的电脑有哪些盘')">💾 看磁盘</button>
            <button class="tip-btn" onclick="sendQuick('打开D盘看看有什么')">📂 浏览D盘</button>
          </div>
        </div>
      </div>
    </div>

    <!-- SELECTION BAR -->
    <div id="selection-bar">
      <div class="sel-info">
        已选择 <strong id="sel-count">0</strong> 个文件
      </div>
      <button class="btn ghost" onclick="clearSelection()">取消</button>
      <button class="btn primary" onclick="openEmailModal()">
        📧 发送到邮箱
      </button>
    </div>

    <!-- EMAIL MODAL -->
    <div class="modal-overlay" id="email-modal">
      <div class="modal">
        <h2>📧 发送文件到邮箱</h2>
        <p id="modal-file-desc">将发送选中的文件</p>
        <div class="modal-label">收件邮箱</div>
        <input
          type="email"
          id="email-input"
          placeholder="例：yourname@gmail.com"
        />
        <textarea id="email-msg" placeholder="附言（可选）"></textarea>
        <div class="modal-actions">
          <button class="btn ghost" onclick="closeEmailModal()">取消</button>
          <button class="btn primary" onclick="doSendEmail()">发送</button>
        </div>
      </div>
    </div>

    <!-- TOAST -->
    <div id="toast"></div>

    <!-- INPUT BAR -->
    <div id="input-bar">
      <textarea
        id="msg-input"
        placeholder="输入消息，例如：帮我找一下上周的报告…"
        rows="1"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()">➤</button>
    </div>

    <script>
      const chatEl = document.getElementById("chat");
      const inputEl = document.getElementById("msg-input");
      const sendBtn = document.getElementById("send-btn");
      let selectedFiles = []; // [{name, path}]
      let pendingEmailFiles = []; // files for email modal
      let isProcessing = false; // Prevent double-submit

      // Load saved email from localStorage
      const savedEmail = localStorage.getItem("file-agent-email") || "";

      // Auto-resize textarea
      inputEl.addEventListener("input", () => {
        inputEl.style.height = "auto";
        inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
      });

      // Enter to send (Shift+Enter for newline)
      inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      function sendQuick(msg) {
        inputEl.value = msg;
        sendMessage();
      }

      async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text || isProcessing) return;

        isProcessing = true;
        appendMsg("user", text);
        inputEl.value = "";
        inputEl.style.height = "auto";
        sendBtn.disabled = true;

        const typingId = showTyping();
        let evtSource = null;

        // 开启 SSE 监听进度
        try {
          evtSource = new EventSource("/progress");
          evtSource.onmessage = function(e) {
            const data = JSON.parse(e.data);
            if (data.status !== "idle") {
              updateTyping(typingId, data.message, data.found_count);
            }
          };
        } catch (e) {
          console.log("SSE error:", e);
        }

        try {
          const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text }),
          });

          if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
          }

          const data = await res.json();
          if (evtSource) {
            evtSource.close();
          }
          removeTyping(typingId);

          if (data.action === "browse" && data.browse_result) {
            appendBrowseResult(data.reply, data.browse_result);
          } else {
            appendMsg("agent", data.reply, data.files || []);
            // Auto-clear selection when new search comes in
            if (data.files && data.files.length > 0) {
              selectedFiles = [];
              updateSelectionBar();
            }
          }
        } catch (e) {
          if (evtSource) evtSource.close();
          removeTyping(typingId);
          appendMsg("agent", "网络错误，请检查服务是否正常运行，然后刷新页面重试。");
        }

        isProcessing = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }

      function appendMsg(role, text, files = []) {
        const div = document.createElement("div");
        div.className = `msg ${role}`;

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = role === "agent" ? "🤖" : "👤";

        const inner = document.createElement("div");
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerHTML = escapeHtml(text).replace(/\n/g, "<br>");
        inner.appendChild(bubble);

        if (files.length > 0) {
          const list = document.createElement("div");
          list.className = "file-list";
          files.forEach((f) => {
            list.appendChild(createFileCard(f));
          });
          inner.appendChild(list);
        }

        div.appendChild(avatar);
        div.appendChild(inner);
        chatEl.appendChild(div);
        chatEl.scrollTop = chatEl.scrollHeight;
      }

      function createFileCard(file) {
        const card = document.createElement("div");
        card.className = "file-card";
        card.dataset.path = file.path;
        card.dataset.name = file.name;

        const icon = document.createElement("div");
        icon.className = "file-icon";
        icon.textContent = getFileIcon(file.ext);

        const info = document.createElement("div");
        info.className = "file-info";

        const name = document.createElement("div");
        name.className = "file-name";
        name.title = file.name;
        name.textContent = file.name;
        
        const pathLine = document.createElement("div");
        pathLine.className = "file-path";
        pathLine.title = file.path;
        pathLine.innerHTML = "&lrm;" + escapeHtml(file.path);

        const meta = document.createElement("div");
        meta.className = "file-meta";
        meta.innerHTML = `<span>${file.size_str}</span><span>${file.modified_str}</span>`;

        info.appendChild(name);
        info.appendChild(pathLine);
        info.appendChild(meta);

        const actions = document.createElement("div");
        actions.className = "file-actions";

        const emailBtn = document.createElement("button");
        emailBtn.className = "btn-small primary";
        emailBtn.textContent = "📧 发邮件";
        emailBtn.onclick = (e) => {
          e.stopPropagation();
          pendingEmailFiles = [file];
          openEmailModal();
        };

        actions.appendChild(emailBtn);
        card.appendChild(icon);
        card.appendChild(info);
        card.appendChild(actions);

        // Click to select
        card.addEventListener("click", () => toggleSelect(card, file));
        return card;
      }

      function toggleSelect(card, file) {
        const idx = selectedFiles.findIndex((f) => f.path === file.path);
        if (idx === -1) {
          selectedFiles.push(file);
          card.classList.add("selected");
        } else {
          selectedFiles.splice(idx, 1);
          card.classList.remove("selected");
        }
        updateSelectionBar();
      }

      function updateSelectionBar() {
        const bar = document.getElementById("selection-bar");
        const cnt = document.getElementById("sel-count");
        cnt.textContent = selectedFiles.length;
        bar.classList.toggle("visible", selectedFiles.length > 0);
      }

      function clearSelection() {
        selectedFiles = [];
        document
          .querySelectorAll(".file-card.selected")
          .forEach((c) => c.classList.remove("selected"));
        updateSelectionBar();
      }

      function openEmailModal(files) {
        if (files) pendingEmailFiles = files;
        const modal = document.getElementById("email-modal");
        const desc = document.getElementById("modal-file-desc");
        const emailInput = document.getElementById("email-input");

        const toSend =
          pendingEmailFiles.length > 0 ? pendingEmailFiles : selectedFiles;

        if (toSend.length === 0) {
          showToast("请先选择要发送的文件", "error");
          return;
        }

        // Show file names (truncate if too many)
        const names = toSend.map((f) => f.name);
        if (names.length <= 3) {
          desc.textContent = "将发送：" + names.join("、");
        } else {
          desc.textContent = `将发送 ${names.length} 个文件：${names.slice(0, 2).join("、")} 等`;
        }

        // Restore saved email
        if (savedEmail && !emailInput.value) {
          emailInput.value = savedEmail;
        }

        modal.classList.add("visible");
        emailInput.focus();
        emailInput.select();
      }

      function closeEmailModal() {
        document.getElementById("email-modal").classList.remove("visible");
        pendingEmailFiles = [];
      }

      async function doSendEmail() {
        const emailInput = document.getElementById("email-input");
        const recipient = emailInput.value.trim();
        const msg = document.getElementById("email-msg").value.trim();

        if (!recipient) {
          showToast("请填写收件邮箱", "error");
          emailInput.focus();
          return;
        }

        // Basic email validation
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailPattern.test(recipient)) {
          showToast("邮箱格式不正确", "error");
          emailInput.focus();
          return;
        }

        const toSend =
          pendingEmailFiles.length > 0 ? pendingEmailFiles : selectedFiles;
        if (toSend.length === 0) {
          showToast("没有选中文件", "error");
          return;
        }

        // Save email to localStorage
        localStorage.setItem("file-agent-email", recipient);

        closeEmailModal();
        appendMsg(
          "agent",
          `正在发送 ${toSend.length} 个文件到 ${recipient}，请稍候…`,
        );

        try {
          const res = await fetch("/send-email", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              recipient,
              file_paths: toSend.map((f) => f.path),
              message: msg,
            }),
          });

          if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
          }

          const data = await res.json();
          appendMsg("agent", data.info);
          if (data.success) {
            showToast("邮件发送成功", "success");
            clearSelection();
            document.getElementById("email-msg").value = ""; // Clear message
          } else {
            showToast("发送失败", "error");
          }
        } catch (e) {
          appendMsg("agent", "发送邮件时出错，请检查网络连接后重试。");
          showToast("网络错误", "error");
        }
      }

      function showTyping() {
        const id = "typing-" + Date.now();
        const div = document.createElement("div");
        div.className = "msg agent";
        div.id = id;
        div.innerHTML = `
          <div class="avatar">🤖</div>
          <div class="bubble typing">
            <div class="typing-dots"><span></span><span></span><span></span></div>
            <div class="progress-text" id="${id}-msg">思考中...</div>
            <div class="progress-count" id="${id}-count" style="display:none"></div>
          </div>`;
        chatEl.appendChild(div);
        chatEl.scrollTop = chatEl.scrollHeight;
        return id;
      }

      function updateTyping(id, msg, count) {
        const msgEl = document.getElementById(`${id}-msg`);
        const countEl = document.getElementById(`${id}-count`);
        if (msgEl && msg) {
          msgEl.textContent = msg;
        }
        if (countEl && count !== undefined) {
          if (count > 0) {
            countEl.style.display = "block";
            countEl.textContent = `已找到 ${count} 个匹配文件`;
          } else {
            countEl.style.display = "none";
          }
        }
        chatEl.scrollTop = chatEl.scrollHeight;
      }

      function removeTyping(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
      }

      async function resetChat() {
        try {
          await fetch("/reset", { method: "POST" });
          chatEl.innerHTML = "";
          appendMsg("agent", "对话已重置，请告诉我你想找什么文件。");
          selectedFiles = [];
          pendingEmailFiles = [];
          updateSelectionBar();
          showToast("对话已清除");
        } catch (e) {
          showToast("重置失败，请刷新页面", "error");
        }
      }

      // Keyboard shortcut: Escape to close modal
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closeEmailModal();
        }
      });

      // Click outside modal to close
      document.getElementById("email-modal").addEventListener("click", (e) => {
        if (e.target.classList.contains("modal-overlay")) {
          closeEmailModal();
        }
      });

      function getFileIcon(ext) {
        const map = {
          ".pdf": "📕", ".doc": "📘", ".docx": "📘",
          ".xls": "📗", ".xlsx": "📗", ".ppt": "📙", ".pptx": "📙",
          ".txt": "📄", ".md": "📝",
          ".jpg": "🖼", ".jpeg": "🖼", ".png": "🖼", ".gif": "🖼", ".webp": "🖼", ".bmp": "🖼",
          ".mp4": "🎬", ".mov": "🎬", ".avi": "🎬",
          ".mp3": "🎵", ".wav": "🎵",
          ".zip": "📦", ".rar": "📦", ".7z": "📦",
          ".py": "🐍", ".js": "⚡", ".html": "🌐", ".css": "🎨", ".json": "🔧",
          ".exe": "⚙️", ".bat": "⚙️",
        };
        return map[ext] || "📄";
      }

      // ── BROWSE RESULT RENDERING ──
      function appendBrowseResult(replyText, browseResult) {
        const div = document.createElement("div");
        div.className = "msg agent";

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = "🤖";

        const inner = document.createElement("div");
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerHTML = escapeHtml(replyText).replace(/\n/g, "<br>");
        inner.appendChild(bubble);

        if (!browseResult.error) {
          inner.appendChild(createBrowsePanel(browseResult));
        }

        div.appendChild(avatar);
        div.appendChild(inner);
        chatEl.appendChild(div);
        chatEl.scrollTop = chatEl.scrollHeight;
      }

      function createBrowsePanel(browseResult) {
        const panel = document.createElement("div");
        panel.className = "browse-panel";

        const pathBar = document.createElement("div");
        pathBar.className = "browse-path-bar";
        pathBar.textContent = "📍 " + browseResult.path;
        panel.appendChild(pathBar);

        const list = document.createElement("div");
        list.className = "browse-list";

        // 渲染目录
        (browseResult.dirs || []).forEach(dir => {
          const item = document.createElement("div");
          item.className = "browse-item is-dir";
          item.innerHTML = `
            <span class="bi-icon">📁</span>
            <span class="bi-name" title="${escapeHtml(dir.path)}">${escapeHtml(dir.name)}</span>
            <span class="bi-meta">${escapeHtml(dir.modified || '')}</span>
            <div class="bi-actions">
              <button class="btn-small" onclick="exploreDir('${escapeHtml(dir.path).replace(/'/g, "\\'")}')">打开</button>
            </div>`;
          item.addEventListener("click", (e) => {
            if (!e.target.closest(".bi-actions")) exploreDir(dir.path);
          });
          list.appendChild(item);
        });

        // 渲染文件
        (browseResult.files || []).forEach(file => {
          const item = document.createElement("div");
          item.className = "browse-item is-file";
          item.innerHTML = `
            <span class="bi-icon">${getFileIcon(file.ext)}</span>
            <span class="bi-name" title="${escapeHtml(file.path)}">${escapeHtml(file.name)}</span>
            <span class="bi-meta">${escapeHtml(file.size_str || '')}</span>
            <div class="bi-actions">
              <button class="btn-small primary" onclick="emailSingleBrowseFile(event,'${escapeHtml(file.name).replace(/'/g, "\\'")}',' ${escapeHtml(file.path).replace(/'/g, "\\'")}')">📧</button>
            </div>`;
          list.appendChild(item);
        });

        if ((browseResult.dirs || []).length === 0 && (browseResult.files || []).length === 0) {
          const empty = document.createElement("div");
          empty.style.cssText = "padding:16px;text-align:center;color:var(--text-dim);font-size:13px";
          empty.textContent = "（空目录）";
          list.appendChild(empty);
        }

        panel.appendChild(list);
        return panel;
      }

      // 点击文件夹深入浏览
      function exploreDir(path) {
        const msg = `打开目录 ${path}`;
        inputEl.value = msg;
        sendMessage();
      }

      // 在浏览视图中给单个文件发邮件
      function emailSingleBrowseFile(e, name, path) {
        e.stopPropagation();
        pendingEmailFiles = [{ name: name.trim(), path: path.trim() }];
        openEmailModal();
      }

      function escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      let toastTimer;
      function showToast(msg, type = "") {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.className = "show" + (type ? " " + type : "");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
          t.className = "";
        }, 3000);
      }
    </script>
  </body>
</html>
